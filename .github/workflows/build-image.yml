name: build-image

# Builds the newserv container image and pushes it to GHCR. We use the
# upstream newserv repo's Dockerfile directly — no fork required. A version
# bump is just changing NEWSERV_REF below to a different commit/tag.

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/build-image.yml"
  workflow_dispatch:
    inputs:
      newserv_repo:
        description: "newserv source repo (owner/name)"
        required: false
        default: "joshkautz/newserv"
      newserv_ref:
        description: "newserv git ref to build (commit SHA, tag, or branch)"
        required: false
        default: "dashboard-character-endpoints"

permissions:
  contents: read
  packages: write

env:
  # Source repository + ref for the newserv build. Defaults to the
  # joshkautz/newserv fork's `dashboard-character-endpoints` branch while
  # we maintain the /y/characters + /y/data/quest/:num/completions
  # endpoints there pending upstream PR merge. Point back at
  # fuzziqersoftware/newserv@master once those land upstream.
  NEWSERV_REPO: ${{ inputs.newserv_repo || 'joshkautz/newserv' }}
  NEWSERV_REF:  ${{ inputs.newserv_ref  || 'dashboard-character-endpoints' }}
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  # Opt every JavaScript action into Node 24 even if it advertises Node 20.
  # GitHub forces this default starting June 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout upstream newserv
        uses: actions/checkout@v5
        with:
          repository: ${{ env.NEWSERV_REPO }}
          ref: ${{ env.NEWSERV_REF }}
          path: newserv

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: resolve upstream SHA
        id: meta
        working-directory: newserv
        run: |
          SHA=$(git rev-parse HEAD)
          SHA_SHORT=$(git rev-parse --short=12 HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: newserv
          file: newserv/Dockerfile
          push: true
          # main = floating "latest from upstream master at last build"
          # sha-XXXX = immutable, use this for production rollbacks
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:sha-${{ steps.meta.outputs.sha_short }}
          # OCI labels — the dashboard reads .Config.Labels.revision at
          # deploy time and exposes it through /api/build for the "newserv
          # <sha> (up to date)" indicator. Full 40-char SHA so the GitHub
          # compare URL works exactly.
          labels: |
            org.opencontainers.image.revision=${{ steps.meta.outputs.sha }}
            org.opencontainers.image.source=https://github.com/fuzziqersoftware/newserv
            org.opencontainers.image.url=https://github.com/fuzziqersoftware/newserv
            org.opencontainers.image.title=newserv
          cache-from: type=gha
          cache-to: type=gha,mode=max
