name: deploy

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "dashboard/**"
      - "docker-compose.yml"
      - "Caddyfile"
      - ".github/workflows/deploy.yml"
  workflow_run:
    workflows: ["build-image", "build-dashboard"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  # Opt every JavaScript action into Node 24 even if it advertises Node 20.
  # GitHub forces this default starting June 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    # Skip if triggered by a failed build-image run.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: discover instance IP
        id: lightsail
        run: |
          IP=$(aws lightsail get-instance \
            --instance-name "${{ vars.LIGHTSAIL_INSTANCE_NAME }}" \
            --query 'instance.publicIpAddress' \
            --output text)
          if [ -z "$IP" ] || [ "$IP" = "None" ]; then
            echo "::error::could not resolve instance public IP"
            exit 1
          fi
          echo "ip=$IP" >> "$GITHUB_OUTPUT"
          echo "Instance IP: $IP"

      - name: configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy
          chmod 600 ~/.ssh/deploy
          ssh-keyscan -H "${{ steps.lightsail.outputs.ip }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: wait for cloud-init
        run: |
          # On a freshly-created instance, cloud-init may still be
          # installing Docker. Block until it's done (or timeout).
          for i in $(seq 1 60); do
            if ssh -i ~/.ssh/deploy -o ConnectTimeout=5 ubuntu@${{ steps.lightsail.outputs.ip }} \
              'test -f /home/ubuntu/pso-server/.cloud-init-done'; then
              echo "cloud-init complete"
              exit 0
            fi
            echo "($i/60) cloud-init not done yet, waiting 10s..."
            sleep 10
          done
          echo "::error::cloud-init did not finish in 10 minutes"
          exit 1

      - name: upload docker-compose.yml + Caddyfile
        run: |
          # Both live at the repo root; both end up at
          # /home/ubuntu/pso-server/ on the deploy host. Caddy's
          # bind-mount reads Caddyfile from there.
          scp -i ~/.ssh/deploy \
            docker-compose.yml \
            Caddyfile \
            ubuntu@${{ steps.lightsail.outputs.ip }}:/home/ubuntu/pso-server/

      - name: pull image
        run: |
          ssh -i ~/.ssh/deploy ubuntu@${{ steps.lightsail.outputs.ip }} \
            'echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin && \
             cd /home/ubuntu/pso-server && \
             docker compose pull'

      - name: seed system/ from image (no-clobber)
        run: |
          # The newserv image bundles a fully-populated /newserv/system
          # directory (blueburst keys, ep3 data, default quests, etc.).
          # docker-compose bind-mounts /home/ubuntu/pso-server/system over
          # that path, which shadows the image-provided files. We seed the
          # host dir with cp -rn so the image's files exist there before
          # our overrides land. -n (no-clobber) preserves anything our
          # rsync already wrote.
          ssh -i ~/.ssh/deploy ubuntu@${{ steps.lightsail.outputs.ip }} \
            'docker run --rm \
               -v /home/ubuntu/pso-server/system:/host-system \
               --entrypoint sh \
               ghcr.io/joshkautz/pso-server:main \
               -c "cp -rn /newserv/system/. /host-system/ && chown -R 1000:1000 /host-system"'

      - name: substitute instance IP into config.json
        run: |
          # newserv's DNS server returns the literal value of ExternalAddress
          # (or LocalAddress for clients on the same subnet) as the IP that
          # PSO should connect to. The repo's config.json has 0.0.0.0 as a
          # placeholder so it's never tied to a specific instance; we patch
          # in the real IP at deploy time.
          IP="${{ steps.lightsail.outputs.ip }}"
          sed -i.bak \
            -e "s|\"LocalAddress\": \"0\.0\.0\.0\"|\"LocalAddress\": \"$IP\"|" \
            -e "s|\"ExternalAddress\": \"0\.0\.0\.0\"|\"ExternalAddress\": \"$IP\"|" \
            server/config.json
          rm server/config.json.bak
          grep -E '"(Local|External)Address"' server/config.json

      - name: rsync overrides to instance
        run: |
          # No --delete: image-provided files in /home/ubuntu/pso-server/system
          # would be wiped on every deploy otherwise.
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy" \
            --exclude='README.md' \
            --exclude='docker-compose.yml' \
            --exclude='cloud-init.sh' \
            server/ \
            ubuntu@${{ steps.lightsail.outputs.ip }}:/home/ubuntu/pso-server/system/

      - name: write .env on the host
        env:
          # All interpolated values flow through env: so the run: block
          # never embeds GitHub Actions `${{ }}` expressions directly in
          # shell. Prevents command injection in the unlikely event any
          # upstream output ever carries shell metacharacters; see
          # https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
          IP:                         ${{ steps.lightsail.outputs.ip }}
          COST_AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_COST_READER_ACCESS_KEY_ID }}
          COST_AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_COST_READER_SECRET_ACCESS_KEY }}
        run: |
          # Builds /home/ubuntu/pso-server/.env atomically with everything
          # docker-compose interpolates. Two reasons it lives here rather
          # than baked into the image:
          #   - NEWSERV_REV is the SHA of the *pulled* image, which is
          #     only knowable on the host (via the OCI label).
          #   - COST_AWS_* are runtime credentials. We never want them
          #     in image layers or git history.
          # If the OCI label is missing on an older image we still emit
          # NEWSERV_REV=unknown so compose substitution doesn't fail.
          ssh -i ~/.ssh/deploy "ubuntu@${IP}" bash -s <<REMOTE
          set -euo pipefail
          cd /home/ubuntu/pso-server
          REV=\$(docker inspect ghcr.io/joshkautz/pso-server:main \
                 --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' \
                 2>/dev/null || true)
          if [ -z "\$REV" ] || [ "\$REV" = "<no value>" ]; then
            REV=unknown
          fi
          umask 077
          cat > .env <<ENV
          NEWSERV_REV=\$REV
          COST_AWS_ACCESS_KEY_ID=${COST_AWS_ACCESS_KEY_ID}
          COST_AWS_SECRET_ACCESS_KEY=${COST_AWS_SECRET_ACCESS_KEY}
          ENV
          echo "recorded newserv revision: \$REV"
          if [ -z "${COST_AWS_ACCESS_KEY_ID}" ]; then
            echo "::warning::AWS_COST_READER_* secrets not set — /api/cost will be 503"
          fi
          REMOTE

      - name: restart container
        run: |
          ssh -i ~/.ssh/deploy ubuntu@${{ steps.lightsail.outputs.ip }} \
            'cd /home/ubuntu/pso-server && \
             docker compose up -d --remove-orphans && \
             docker image prune -f'

      - name: reload newserv config + dependencies
        run: |
          # The system/ tree is bind-mounted, so changes to config.json, quests,
          # or client-function patches don't recreate the newserv container
          # above. SIGUSR2 makes the running server re-read config.json AND all
          # dependencies (quests, maps, client-function patches) live, with no
          # player disconnects. SIGUSR1 reloads only config.json, which would
          # miss patch changes (e.g. BankSize/StackLimits) and could leave
          # BBRequiredPatches pointing at unloaded patches. If the container was
          # just recreated it already has everything, so this is a harmless
          # second reload.
          ssh -i ~/.ssh/deploy ubuntu@${{ steps.lightsail.outputs.ip }} \
            'docker kill --signal SIGUSR2 newserv || true'

      - name: install backup pipeline (script + systemd timer)
        env:
          BACKUP_BUCKET: ${{ vars.BACKUP_BUCKET }}
          BACKUP_KEY_ID: ${{ secrets.AWS_BACKUP_ACCESS_KEY_ID }}
          BACKUP_SECRET: ${{ secrets.AWS_BACKUP_SECRET_ACCESS_KEY }}
        run: |
          # Bail with a helpful message if the backup secrets/vars aren't
          # set yet. terraform apply creates the IAM user; the secrets
          # have to be pushed to GitHub manually (see infra/README.md).
          if [ -z "$BACKUP_BUCKET" ] || [ -z "$BACKUP_KEY_ID" ] || [ -z "$BACKUP_SECRET" ]; then
            echo "::warning::backup secrets/vars not set — skipping backup install"
            echo "::warning::run 'terraform output backup_*' locally and push to GH"
            exit 0
          fi

          IP="${{ steps.lightsail.outputs.ip }}"

          # Upload script + unit files
          scp -i ~/.ssh/deploy \
            server/backup/pso-backup.sh \
            server/backup/pso-backup.service \
            server/backup/pso-backup.timer \
            ubuntu@$IP:/tmp/

          # Install in /etc and /usr/local/bin, write env file, start timer
          ssh -i ~/.ssh/deploy ubuntu@$IP "sudo bash -s" <<EOF
            set -euo pipefail
            install -m 0755 /tmp/pso-backup.sh /usr/local/bin/pso-backup.sh
            install -m 0644 /tmp/pso-backup.service /etc/systemd/system/pso-backup.service
            install -m 0644 /tmp/pso-backup.timer /etc/systemd/system/pso-backup.timer
            rm -f /tmp/pso-backup.{sh,service,timer}

            # Write env file with backup credentials. Mode 0600 so only
            # root reads it.
            umask 077
            cat > /etc/pso-backup.env <<ENV
          PSO_BACKUP_BUCKET="$BACKUP_BUCKET"
          AWS_ACCESS_KEY_ID="$BACKUP_KEY_ID"
          AWS_SECRET_ACCESS_KEY="$BACKUP_SECRET"
          AWS_DEFAULT_REGION="${{ vars.AWS_REGION }}"
          ENV
            chmod 0600 /etc/pso-backup.env

            systemctl daemon-reload
            systemctl enable --now pso-backup.timer
            systemctl list-timers pso-backup.timer --no-pager
          EOF

      - name: health check
        run: |
          # Give newserv a few seconds to start up, then check the
          # container is running and the DNS port is bound.
          sleep 10
          ssh -i ~/.ssh/deploy ubuntu@${{ steps.lightsail.outputs.ip }} \
            'docker ps --filter name=newserv --format "{{.Status}}" | grep -q "Up" && \
             docker logs --tail=20 newserv'
