name: infra

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read
  pull-requests: write  # for PR plan comment

concurrency:
  group: infra
  cancel-in-progress: false

env:
  TF_VERSION: "1.10.3"
  TF_IN_AUTOMATION: "true"

jobs:
  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt -check
        run: terraform fmt -check -recursive

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan -var "ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" 2>&1 | tee plan.txt
        continue-on-error: true

      - name: comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            const body = [
              '### Terraform plan',
              '',
              '```hcl',
              plan.length > 60000 ? plan.slice(0, 60000) + '\n... (truncated)' : plan,
              '```',
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: fail if plan errored
        if: steps.plan.outcome != 'success'
        run: exit 1

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: tfplan
          path: infra/tfplan
          retention-days: 7

  apply:
    name: terraform apply
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: plan
    runs-on: ubuntu-latest
    environment: production  # configure required reviewers in repo settings
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infra

      - name: terraform apply
        run: terraform apply -auto-approve tfplan
