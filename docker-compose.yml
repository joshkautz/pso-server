services:
  newserv:
    # Image is built and pushed by .github/workflows/build-image.yml
    # The :main tag is overwritten on every successful build from main.
    # Pin to a specific SHA tag (ghcr.io/joshkautz/pso-server:sha-abc1234) for
    # reproducible deploys.
    image: ghcr.io/joshkautz/pso-server:main
    container_name: newserv
    restart: unless-stopped
    pull_policy: always

    # Bind-mount the system directory from the host so config changes
    # don't require an image rebuild. The deploy workflow rsyncs the
    # contents of ./server/ to /home/ubuntu/pso-server/system/ on the
    # instance before running `docker compose up`.
    volumes:
      - /home/ubuntu/pso-server/system:/newserv/system

    # Lightsail's host firewall is what actually gates traffic; this just
    # routes the published ports from the host to the container.
    # UDP 53 is bound on the host as a privileged port — docker handles that.
    #
    # Note: TCP 8081 (the REST API set by HTTPListen in config.json) is
    # NOT published to the host. It's only reachable from sibling
    # containers on the `internal` network below — specifically the
    # dashboard service, which proxies a strict allowlist of endpoints
    # to the public internet.
    ports:
      # DNS
      - "53:53/udp"
      # PSO GC game/login range
      - "9000-9204:9000-9204/tcp"
      # PSO PC
      - "9300:9300/tcp"
      # PSO Xbox
      - "9500:9500/tcp"
      # PSO Blue Burst (patch servers + game/data ports)
      - "10000-12001:10000-12001/tcp"

    networks:
      - internal

    # Sensible production defaults.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    # Built and pushed by .github/workflows/build-dashboard.yml from the
    # dashboard/ directory.
    image: ghcr.io/joshkautz/pso-dashboard:main
    container_name: pso-dashboard
    restart: unless-stopped
    pull_policy: always

    depends_on:
      - newserv

    environment:
      # The dashboard backend reaches newserv via the docker network using
      # the service name + the HTTPListen port from server/config.json.
      NEWSERV_API: "http://newserv:8081"
      # The deployed newserv commit SHA. deploy.yml writes this into .env
      # on the host by reading the OCI org.opencontainers.image.revision
      # label off the pulled image, and compose substitutes it here.
      # Defaults to "unknown" so the dashboard still boots cleanly when
      # the label is missing (e.g. images built before the label landed).
      NEWSERV_REV: "${NEWSERV_REV:-unknown}"

    # No published ports — Caddy is in front and reaches us via the
    # internal network at http://dashboard:8080.
    networks:
      - internal

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    # Public HTTPS layer for the dashboard. Listens on 80 + 443 on the
    # host, terminates TLS via Let's Encrypt, and reverse-proxies to the
    # dashboard container on the internal network. Auto-renews certs.
    image: caddy:2-alpine
    container_name: pso-caddy
    restart: unless-stopped
    depends_on:
      - dashboard

    ports:
      # Both required: 80 is used for the ACME HTTP-01 challenge AND for
      # the HTTP -> HTTPS redirect; 443 serves the dashboard over TLS.
      - "80:80"
      - "443:443"

    volumes:
      # Bind-mount the Caddyfile from the host so config changes don't
      # require rebuilding anything.
      - /home/ubuntu/pso-server/Caddyfile:/etc/caddy/Caddyfile:ro
      # Persistent storage for issued certificates + ACME account state.
      # Without these volumes, every container restart re-fetches certs
      # and you'll hit Let's Encrypt rate limits.
      - caddy_data:/data
      - caddy_config:/config

    networks:
      - internal

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:

# Isolated bridge network so newserv's REST API on :8081 is reachable
# only from sibling containers, never from the host or the internet.
networks:
  internal:
    driver: bridge
